services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: perception
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in your .env file}
      DATABASE_URL: postgres://postgres:postgres@db:5432/perception
    ports:
      - "3000:3000"

volumes:
  postgres_data:
